<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK3 Character Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>⚔️ Crusader Kings 3 Character Generator ⚔️</h1>
        
        <button class="generate-btn" onclick="generateCharacter()">
            🎲 Generate Random Character
        </button>
        
        <div id="characterResult">
            <div class="loading">Click the button to generate your character!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
